<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DomoDreams — Theme Viewer (JSON-driven)</title>
<style>
  /* ---- viewer chrome ---- */
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#1b1c1e;color:#e8e8ea;font-family:system-ui,'Segoe UI',Roboto,sans-serif;line-height:1.5;
       height:100vh;display:flex;flex-direction:column;overflow:hidden}
  /* two-pane stage: preview scrolls on the left, editor fills the right column */
  .stage{flex:1 1 auto;display:flex;min-height:0}
  .bar{position:sticky;top:0;z-index:30;display:flex;gap:14px;align-items:center;flex-wrap:wrap;
       background:#111214;border-bottom:1px solid #000;padding:11px 20px}
  .bar h1{font-size:14px;margin:0;font-weight:800;letter-spacing:.03em}
  .bar select{font:inherit;font-weight:600;padding:7px 11px;border-radius:9px;border:1px solid #45464a;background:#25262a;color:#e8e8ea}
  .badge{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:6px;border:1px solid #3a3b40;background:#232428;color:#b9bbc0}
  .bar .meta{font-size:12px;color:#9a9ba0}
  .bar button{font:inherit;font-weight:600;font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid #45464a;background:#25262a;color:#e8e8ea;cursor:pointer}
  .bar button:hover{background:#303136}
  .bar .spacer{margin-left:auto}
  .bar-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .bar-actions button{white-space:nowrap}
  .bar button:disabled{opacity:.4;cursor:not-allowed}
  .bar button.ghost{border-color:#333;background:transparent;color:#8c8d92}
  .bar button.ghost:hover{background:#232428;color:#c9cbd0}
  #ghBtn{border-color:#2f5233;background:#1c2b1e;color:#bfe6c4}
  #ghBtn:hover{background:#243826}
  #promptBtn{border-color:#4a3a5e;background:#251c33;color:#d7c3f0}
  #promptBtn:hover{background:#2f2440}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:100;
    background:#0e0f11;color:#e8e8ea;border:1px solid #3a3b40;border-radius:9px;
    padding:10px 16px;font-size:12.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.55);max-width:74vw;text-align:center}
  .toast[hidden]{display:none}
  /* ---- single-theme editor ---- */
  #editor{order:2;flex:0 0 clamp(380px,42%,660px);display:flex;flex-direction:column;
          background:#161719;border-left:1px solid #000;padding:14px 16px;overflow:auto}
  #editor[hidden]{display:none}
  .ed-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;flex:0 0 auto}
  .ed-title{font-size:12.5px;color:#b9bbc0}
  .ed-title code{background:#0e0f11;padding:1px 5px;border-radius:4px;color:#8cccff;font-family:ui-monospace,monospace}
  .ed-status{font-size:12px;font-weight:700;font-family:ui-monospace,monospace}
  .ed-status.ok{color:#7bd07b}
  .ed-status.bad{color:#ff9b8f}
  .ed-actions{margin-left:auto;display:flex;gap:8px}
  #editor button{font:inherit;font-weight:600;font-size:12px;padding:6px 11px;border-radius:8px;border:1px solid #45464a;background:#25262a;color:#e8e8ea;cursor:pointer}
  #editor button:hover{background:#303136}
  .ed-wrap{position:relative;flex:1 1 auto;min-height:160px;border:1px solid #33343a;border-radius:8px;overflow:hidden;background:#0e0f11}
  .ed-hl,#ed-code{margin:0;padding:12px;font-family:ui-monospace,'SF Mono',monospace;font-size:12.5px;line-height:1.5;
       white-space:pre;tab-size:2;position:absolute;inset:0;overflow:auto;border:0;letter-spacing:normal}
  .ed-hl{pointer-events:none;color:#c9cbd0}
  .ed-hl code{font:inherit}
  #ed-code{background:transparent;color:transparent;caret-color:#e8e8ea;resize:none;outline:none}
  .ed-hl .key{color:#8cccff}
  .ed-hl .str{color:#c3e88d}
  .ed-hl .num{color:#f7c56b}
  .ed-hl .bool,.ed-hl .null{color:#c792ea}
  .ed-msgs{margin-top:9px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;flex:0 0 auto;max-height:120px;overflow:auto}
  .ed-msgs .e{color:#ff9b8f}
  .ed-msgs .w{color:#f7c56b}
  /* form (GUI) editor */
  .ed-tabs{display:flex;gap:6px;margin-bottom:-1px;flex:0 0 auto}
  .etab{font:inherit;font-size:12px;font-weight:600;padding:5px 14px;border-radius:7px 7px 0 0;border:1px solid #33343a;border-bottom:0;background:#1d1e22;color:#9a9ba0;cursor:pointer}
  .etab.on{background:#0e0f11;color:#e8e8ea}
  .ed-form{flex:1 1 auto;overflow:auto;border:1px solid #33343a;border-radius:0 8px 8px 8px;background:#0e0f11;padding:12px}
  .ed-form[hidden],.ed-wrap[hidden]{display:none}
  .fgrp{margin:0 0 16px}
  .fgrp-t{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#8c8d92;margin:0 0 9px;border-bottom:1px solid #23242a;padding-bottom:5px}
  .fld{display:flex;align-items:center;gap:10px;margin:0 0 7px}
  .fld-k{flex:0 0 130px;font-family:ui-monospace,monospace;font-size:11.5px;color:#c9cbd0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fld-c{flex:1 1 auto;display:flex;align-items:center;gap:7px;min-width:0}
  .fi{font:inherit;font-size:12px;background:#191a1d;color:#e8e8ea;border:1px solid #34353b;border-radius:6px;padding:5px 8px;min-width:0;flex:1 1 auto}
  .fi:focus{outline:1px solid #4a6fa5}
  .fcol{width:32px;height:27px;padding:2px;border:1px solid #34353b;border-radius:6px;background:#191a1d;cursor:pointer;flex:0 0 auto}
  .fnum{max-width:96px;flex:0 0 auto}
  .fhex{max-width:112px;flex:0 0 auto;font-family:ui-monospace,monospace}
  .funit{color:#8c8d92;font-size:11px}
  .ftxt{font-family:ui-monospace,monospace;font-size:11px;resize:vertical;white-space:pre;line-height:1.4}
  .fcss{font-family:ui-monospace,monospace;font-size:11px;width:100%;resize:vertical}
  .fbig{font-family:ui-monospace,monospace;font-size:11px;color:#8c8d92;flex:1 1 auto}
  #ed-form input[type=checkbox]{width:16px;height:16px;accent-color:#8cccff;flex:0 0 auto}
  /* ---- layout ---- */
  .view{order:1;flex:1 1 auto;min-width:0;overflow:auto;padding:22px 20px 60px}
  .sect{margin:0 0 34px}
  .sect > h2{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#8c8d92;margin:0 0 14px;border-bottom:1px solid #2a2b2f;padding-bottom:8px}
  .row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start}
  /* palette */
  .sw{display:flex;flex-direction:column;gap:6px;align-items:center;width:96px}
  .sw .chip{width:96px;height:56px;border-radius:10px;border:1px solid rgba(255,255,255,.12)}
  .sw .nm{font-size:11px;color:#c9cbd0;font-weight:600}
  .sw .hex{font-family:ui-monospace,monospace;font-size:10.5px;color:#8c8d92}
  /* baked surface matrix */
  .cell{display:flex;flex-direction:column;gap:8px;align-items:center}
  .tag{font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:#c9cbd0;text-align:center;word-break:break-all;max-width:220px}
  .tag b{color:#fff}
  .frame{background-image:
      linear-gradient(45deg,#3a3b3e 25%,transparent 25%),linear-gradient(-45deg,#3a3b3e 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#3a3b3e 75%),linear-gradient(-45deg,transparent 75%,#3a3b3e 75%);
    background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;background-color:#2c2d30;
    outline:1px dashed #55575c;position:relative}
  .note{max-width:900px;color:#a9abb0;font-size:13px;margin:0 0 14px}
  /* clock (digital) */
  .clock{width:360px;height:360px;border-radius:20px;overflow:hidden;position:relative;
         display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .clock .day{font-size:11px;font-weight:600;letter-spacing:.34em}
  .clock .date{font-size:9.5px;font-weight:500;letter-spacing:.22em;margin-top:7px}
  .clock .time{font-size:74px;font-weight:200;letter-spacing:.01em;margin-top:14px}
  .clock .time .secs{font-size:28px;font-weight:300}
  .clock .credit{font-size:9px;font-weight:500;letter-spacing:.14em;margin-top:12px}
  .clock .alarm{margin-top:20px;display:flex;align-items:center;gap:8px;padding:0 16px;height:40px;position:relative}
  .clock .alarm .surf{position:absolute;inset:0;border-radius:14px}
  .clock .alarm .lbl{font-size:12px;font-weight:500;letter-spacing:.06em;position:relative}
  /* rocker */
  .rk-wrap{display:flex;flex-direction:column;gap:8px;width:219px}
  .rk{position:relative;overflow:hidden}
  .rk-led{position:absolute;left:19.1%;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%}
  .rk-led.off{background:var(--led-off-grad);box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
  .rk-led.on{background:var(--led-on-grad);box-shadow:var(--led-glow)}
  .rk-seam{position:absolute;left:38.2%;top:0;bottom:0;width:1px;background:var(--raised-dark);opacity:.5}
  .rk .rk-recess{position:absolute;left:38.2%;right:0;top:0;bottom:0;border-radius:0 var(--radius) var(--radius) 0}
  .rk-content{position:absolute;left:38.2%;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:7px;
              color:var(--muted);font-weight:700;font-size:14px}
  .rk-content.on{color:var(--accent-ink,var(--accent));text-shadow:var(--label-glow,none)}
  .rk-content svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .rk-content.on svg{filter:var(--icon-glow,none)}
  .rk-cap{font-size:11px;color:#8c8d92;font-family:ui-monospace,monospace;text-align:center}
  /* panel mock (480 rendered at 400) */
  .panel{width:400px;height:400px;border-radius:20px;overflow:hidden;position:relative;padding:11px;
    display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:10px;grid-auto-flow:row dense;
    background:var(--face-image,var(--wood-panel,var(--face)));background-size:cover;background-position:center;
    box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .panel .surf{width:auto;height:auto;min-width:0;min-height:0}
  .p-btn{flex-direction:column;gap:4px}
  .p-ico{color:var(--muted);line-height:0}
  .p-ico.on{color:var(--accent-ink,var(--accent));filter:var(--icon-glow,none)}
  .p-ico svg{width:25px;height:25px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
  .p-lbl{font-size:11px;font-weight:600;color:var(--muted)}
  .p-lbl.on{color:var(--accent-ink,var(--accent));text-shadow:var(--label-glow,none)}
  .p-dot{position:absolute;top:7px;right:7px;width:9px;height:9px;border-radius:50%;background:var(--status);box-shadow:0 0 0 2px var(--face),0 0 6px var(--status)}
  .p-cells{display:flex;gap:5px}
  .p-cells.v{flex-direction:column-reverse;width:52%;height:80%}
  .p-cells.h{flex-direction:row;height:50%;flex:1 1 auto;min-width:0}
  .p-cap{color:var(--muted);line-height:0;flex:0 0 auto}
  .p-cap svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
  .p-cell{flex:1;border-radius:3px;background:var(--led-off-grad);box-shadow:inset 0 1px 2px var(--inset-dark)}
  .p-cell.on{background:var(--led-on-grad);box-shadow:var(--led-glow)}
  .p-seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted)}
  .p-seg.on{color:var(--accent-ink,var(--accent));text-shadow:var(--label-glow,none)}
  .p-split{position:relative;overflow:hidden}
  .p-split .p-seg2{position:absolute;top:0;bottom:0;width:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .p-split .p-seg2.l{left:0}
  .p-split .p-seg2.r{right:0}
  .p-split .p-seam{position:absolute;left:50%;top:16%;bottom:16%;width:1px;background:var(--raised-dark);opacity:.6}
  /* recess is a real .surf.inset overlay, so it matches the inset state buttons
     exactly for every theme (incl. Oak Wood's photographic inset) */
  .p-split .p-seg-recess{position:absolute;left:0;top:0;bottom:0;width:50%;border-radius:var(--radius) 0 0 var(--radius)}
  /* analog clock */
  .aclock{width:360px;height:360px;border-radius:20px;position:relative;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .aclock svg{position:absolute;inset:0}
  .anum{position:absolute;width:28px;height:22px;line-height:22px;text-align:center;font-size:18px;font-weight:300;color:var(--ink)}
  .acomp{position:absolute;left:0;right:0;top:27%;text-align:center;pointer-events:none}
  .acomp .d{font-size:11px;font-weight:600;letter-spacing:.32em;color:var(--accent)}
  .acomp .dt{font-size:9px;font-weight:500;letter-spacing:.2em;color:var(--muted);margin-top:3px}
  /* ---- Alarmo (security) + Music screens ---- */
  .screen{width:400px;height:400px;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .alarmo svg,.music svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;width:100%;height:100%}
  .alarmo{display:flex;flex-direction:column;padding:10px;gap:9px}
  .al-display{height:56px;display:flex;align-items:center;gap:11px;padding:0 16px;position:relative}
  .al-display .surf{position:absolute;inset:0;border-radius:14px}
  .al-ico{width:26px;height:26px;flex:0 0 auto;z-index:1}
  .al-lbl{flex:1;font-size:18px;font-weight:800;z-index:1}
  .al-dots{display:flex;gap:5px;z-index:1}
  .al-dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  .al-body{flex:1;display:flex;gap:8px;min-height:0}
  .al-keypad{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:7px}
  .al-key{position:relative;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:700;color:var(--ink)}
  .al-key .surf,.al-act .surf{position:absolute;inset:0}
  .al-key span,.al-act span{position:relative;z-index:1}
  .al-key .ai{width:30px;height:30px}
  .al-rail{width:100px;display:grid;grid-template-rows:repeat(4,1fr);gap:7px}
  .al-act{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:700}
  .al-act .ai{width:28px;height:28px}
  .music{display:flex;flex-direction:column;padding:16px}
  .mu-head{display:flex;gap:14px;align-items:flex-start}
  .mu-art{width:96px;height:96px;border-radius:16px;position:relative;overflow:hidden;flex:0 0 auto}
  .mu-art .surf{position:absolute;inset:0}
  .mu-art .mi{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .mu-art .mi svg{width:34px;height:34px}
  .mu-meta{flex:1;min-width:0}
  .mu-title{font-size:22px;font-weight:800;color:var(--ink)}
  .mu-sub{font-size:15px;font-weight:600;color:var(--muted);margin-top:6px}
  .mu-transport{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px}
  .mu-round{position:relative;display:flex;align-items:center;justify-content:center}
  .mu-round .surf{position:absolute;inset:0;border-radius:50%}
  .mu-round svg{position:relative;z-index:1;fill:currentColor;stroke:none}
  .mu-r-sm{width:56px;height:56px;color:var(--ink)}
  .mu-r-sm svg{width:22px;height:22px}
  .mu-r-big{width:74px;height:74px;color:var(--accent)}
  .mu-r-big svg{width:28px;height:28px}
  .mu-vol{margin-top:22px;height:60px;display:flex;align-items:center;gap:8px;padding:0 12px;position:relative}
  .mu-vol .surf{position:absolute;inset:0}
  .mu-vol .vcap{width:20px;height:20px;color:var(--muted);z-index:1;flex:0 0 auto}
  .mu-cells{flex:1;display:flex;gap:4px;height:42%;z-index:1}
  .mu-cell{flex:1;border-radius:3px;background:var(--led-off-grad)}
  .mu-cell.on{background:var(--led-on-grad);box-shadow:var(--led-glow)}
  .mu-browse{margin-top:auto;height:74px;position:relative;display:flex;align-items:center;justify-content:center;gap:9px;color:var(--accent);font-size:16px;font-weight:800}
  .mu-browse .surf{position:absolute;inset:0}
  .mu-browse svg{width:22px;height:22px;z-index:1}
  .mu-browse span{z-index:1}
  /* neutralize theme-baked surface LED on live-drawn parts (clock chip + rocker),
     exactly like the app: those never use the baked .surf::after / .surf.on LED. */
  .surf.no-led::after{content:none !important}
</style>

<!-- Self-contained authoring brief (not rendered/executed). If you are creating themes
     from this file (e.g. Claude Design), read this + the <script id="seed"> examples. -->
<script type="text/markdown" id="theme-authoring">
THEME AUTHORING — how to create/update a theme from this file
=============================================================
This file IS the toolkit. `<script id="seed">` below holds 30 example themes; the
Form/JSON editor (✎ Edit this theme) validates + previews live. Author ONE Theme
object and paste it into the JSON tab.

Theme = {
  name: kebab-slug (unique),  label: string,
  appearance: "light" | "dark"  (from --face luminance),
  flat: false = the glyph relights on ON, surface unchanged (any surface style)
      | true = the surface itself lights on ON (strategy-B, baked active surface),
  tokens: { "--xxx": "value", ... },
  surfaceCss: ""    // EMPTY when the glyph carries state (flat:false); theme-scoped CSS when the surface does
}

TOKENS
  ground   --face (panel bg) · --face-image (optional 480x480 photo ground) · --depth 0-1 (0=flat) · --radius e.g. 14px
  surface  --raised-grad / --inset-grad (fills) · --raised-light/-dark · --inset-light/-dark (bevels)
  text     --ink (idle glyph, numerals) · --muted (off state, date, minor ticks)
  accent   --accent (on) · --accent-ink (lit glyph color; darken if pale on a light face) · --accent-glow
  status   --status (red status dot) · --success / --warning / --error (semantic colours; default green/amber/red — the Alarmo panel — each theme may override)
  LED      --led-on-grad / --led-off-grad = what the dimmer/rocker LEDs SHOW · --led-glow = lit halo
           (--led-on / --led-off are base colors + fallback; editing them alone changes nothing)
  glow     --icon-glow (+ --icon-glow-hi) · --label-glow
  flat     --neumorphic:"0" (marks flat) · --glyph-always-lit:"1" (glyph always accent)

SHAPES   raised = raised-grad + bevel · inset = inset-grad + bevel · ON(flat:false) = glyph relights,
         surface unchanged · ON(flat:true) = surface lights via surfaceCss (.surf.on / .surf.inset.on).
         Dimmer/rocker LEDs and the clocks are drawn live from the tokens above.

GOLDEN RULE  state must be visible: flat:false -> the glyph relights; flat:true -> the surface lights.
             Never --glyph-always-lit on a static surface.

surfaceCss   flat:false -> "".  flat:true / photographic -> the .surf / .surf.on / .surf.inset.on rules,
             with EVERY selector referencing THIS theme's own name.  Never edit baseCss.

OUTPUT   one Theme JSON object, pasteable into the editor's Edit -> JSON tab (validates
         against the Theme type + previews live). Approved themes become
         themes/<name>.theme.json (build-themes.mjs reassembles themes.json).
         Full reference: THEME-SPEC.md.
</script>

<script type="text/markdown" id="claude-design-prompt">
You are helping me design a THEME for the DomoDreams NSPanel Pro control panel.

The toolkit is a self-contained studio — `themes-viewer.html` — that renders every
theme exactly as the panel does (colour palette, a 480×480 button grid, analog +
digital clocks, an alarm keypad, and a music player). Open it: if you can browse the
web, fetch it here —

  https://nspanel.domodreams.it/themes-viewer.html

— otherwise use the copy I've attached to this message. Before you start, read the
`<script id="theme-authoring">` brief and the example themes in `<script id="seed">`
inside that file so your output matches the real token model.

## What I want
<!-- Replace this line: describe the theme in a sentence or two, e.g.
     "a warm terracotta desert theme, light appearance, soft raised surfaces", or
     "update the `cyberpunk` theme to be less saturated and easier on the eyes". -->

## Output — a single Theme object, nothing else runs on the panel
```json
{
  "name": "kebab-slug",             // unique, [a-z0-9-_]; the data-theme id
  "label": "Human Name",
  "appearance": "light",            // "light" | "dark", from the --face luminance
  "flat": false,                    // false = the glyph relights on ON (surface stays put, any style)
                                    // true  = the surface itself lights on ON (via surfaceCss)
  "tokens": { "--face": "#…", "…": "…" },
  "surfaceCss": ""                  // "" when the glyph carries state; theme-scoped CSS when the surface does
}
```

### Required tokens (all must be present)
`--face --depth --radius --raised-grad --inset-grad --raised-light --raised-dark
--inset-light --inset-dark --ink --muted --accent --led-on-grad --led-off-grad`

Recommended: `--accent-ink --status --success --warning --error --led-glow
--icon-glow --label-glow`. Colours are `#rrggbb` (or `#rrggbbaa` for alpha);
gradients look like `linear-gradient(145deg,#a,#b)`. What each token does is in the
attached brief and THEME-SPEC.md §3. Every `surfaceCss` selector must reference the
theme's OWN `name`.

### The golden rule (non-negotiable)
State must be visible. A theme with `flat: false` keeps `surfaceCss` empty and relights
the glyph (`--muted` → `--accent`) on ON. A theme with `flat: true` lights the surface
itself via `surfaceCss` (`.surf.on` / `.surf.inset.on`). Never make the glyph always-lit
on a static surface — the on/off state would be invisible.

1. The single Theme JSON object, in a ```json block, ready to paste into the studio's
   **Edit → JSON** tab (it validates and previews live). If I asked you to *update* an
   existing theme, keep its `name` and change the tokens.

   you opened at the URL above as a runnable HTML artifact, but with your new theme
   injected into its `<script id="seed">` themes array and selected by default (you may
   drop the other bundled themes from that seed to keep the artifact light — keep
   `baseCss` + your theme). This renders the real panel previews (palette, 480×480 grid,
   clocks, alarm, music) in your theme so I can see it without leaving Claude Design.
3. A short GitHub feature-request body I can submit, containing: a one-paragraph
   description of the look, the JSON in a fenced block, and this checklist —
   - [ ] State is visible (the glyph relights, or the surface lights, on ON)
   - [ ] Previewed in themes-viewer.html
   - [ ] `name` is a unique kebab slug

Design ONE theme unless I ask for more. Prefer editing the closest existing example
over starting from nothing, and keep text legible on the chosen `--face`.

<script>
// ---- the baked-surface matrix (mirror of tools/png-pipeline/cut-surfaces.mjs VARIANTS) ----
const VARIANTS = [
  { key:'button.square', cls:'s-1x1', w:105, h:99,  modes:['raised','inset'] },
  { key:'button.circle', cls:'s-circle', w:128, h:128, modes:['raised','inset'] },
  { key:'tile.1x2', cls:'s-1x2', w:105, h:210, modes:['raised','inset'] },
  { key:'tile.1x3', cls:'s-1x3', w:105, h:321, modes:['raised','inset'] },
  { key:'tile.1x4', cls:'s-1x4', w:105, h:432, modes:['raised','inset'] },
  { key:'tile.2x1', cls:'s-2x1', w:219, h:99,  modes:['raised','inset'] },
  { key:'tile.2x2', cls:'s-2x2', w:219, h:210, modes:['raised','inset'] },
  { key:'tile.2x3', cls:'s-2x3', w:219, h:321, modes:['raised','inset'] },
  { key:'tile.2x4', cls:'s-2x4', w:219, h:432, modes:['raised','inset'] },
  { key:'tile.3x1', cls:'s-3x1', w:333, h:99,  modes:['raised','inset'] },
  { key:'tile.3x2', cls:'s-3x2', w:333, h:210, modes:['raised','inset'] },
  { key:'tile.3x3', cls:'s-3x3', w:333, h:321, modes:['raised','inset'] },
  { key:'tile.3x4', cls:'s-3x4', w:333, h:432, modes:['raised','inset'] },
  { key:'tile.4x1', cls:'s-4x1', w:447, h:99,  modes:['raised','inset'] },
  { key:'tile.4x2', cls:'s-4x2', w:447, h:210, modes:['raised','inset'] },
  { key:'tile.4x3', cls:'s-4x3', w:447, h:321, modes:['raised','inset'] },
  { key:'tile.4x4', cls:'s-4x4', w:447, h:432, modes:['raised','inset'] },
  { key:'dimmer.track.vertical', cls:'dim-v s-1x3', w:105, h:321, modes:['inset'] },
  { key:'dimmer.track.horizontal', cls:'dim-h s-2x1', w:219, h:99, modes:['inset'] },
  { key:'dimmer.outset.vertical', cls:'dim-v s-1x3', w:105, h:321, modes:['raised'] },
  { key:'dimmer.outset.horizontal', cls:'dim-h s-2x1', w:219, h:99, modes:['raised'] },
  { key:'split.seg.inset', w:110, h:99, modes:['inset'], pad:0, custom:true },
];
const PAD = 44;
const safe = (s) => s.replace(/[^a-z0-9.]/gi, '_');
let DATA = null;

const $ = (id) => document.getElementById(id);
const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
const tokensToCss = (tok) => Object.entries(tok).map(([k, v]) => `${k}:${v}`).join(';');

// A themed wrapper: tokens resolve, background transparent, no min-height inflation.
function themed(name, cls) {
  const d = el('div', 'themed' + (cls ? ' ' + cls : ''));
  d.setAttribute('data-theme', name);
  d.style.cssText = 'min-height:0;background:transparent';
  return d;
}

function buildStyle(data) {
  const parts = [data.baseCss || ''];
  for (const t of data.themes) {
    parts.push(`.themed[data-theme="${t.name}"]{${tokensToCss(t.tokens || {})}}`);
    if (t.surfaceCss) parts.push(t.surfaceCss);
  }
  $('theme-style').textContent = parts.join('\n');
}

function section(title, node, note) {
  const s = el('section', 'sect');
  s.appendChild(el('h2', null, title));
  if (note) { const p = el('p', 'note'); p.innerHTML = note; s.appendChild(p); }
  s.appendChild(node);
  return s;
}

// ---- palette ----
const PAL = ['--face', '--ink', '--muted', '--accent', '--accent-ink', '--led-on', '--led-off', '--status'];
function renderPalette(t) {
  const row = el('div', 'row');
  for (const k of PAL) {
    const v = t.tokens[k];
    if (!v) continue;
    const sw = el('div', 'sw');
    const chip = el('div', 'chip'); chip.style.background = v;
    sw.appendChild(chip);
    sw.appendChild(el('div', 'nm', k.replace('--', '')));
    sw.appendChild(el('div', 'hex', v.length > 16 ? v.slice(0, 15) + '…' : v));
    row.appendChild(sw);
  }
  return row;
}

// ---- baked-surface matrix ----
function frame(name, key, cls, mode, w, h, custom, pad, suffix, on) {
  const cell = el('div', 'cell');
  const wrap = themed(name);
  const fr = el('div', 'frame');
  fr.style.width = (w + 2 * pad) + 'px';
  fr.style.height = (h + 2 * pad) + 'px';
  const surf = el('div', 'surf ' + mode + (custom ? '' : ' ' + cls) + (on ? ' on' : ''));
  if (custom) { surf.style.width = w + 'px'; surf.style.height = h + 'px'; surf.style.borderRadius = '0'; }
  surf.style.position = 'absolute';
  surf.style.left = pad + 'px';
  surf.style.top = pad + 'px';
  fr.appendChild(surf); wrap.appendChild(fr); cell.appendChild(wrap);
  const tag = el('div', 'tag');
  tag.innerHTML = '<b>' + safe(key) + '.' + suffix + '.webp</b><br>' + w + '×' + h + ' +' + pad + 'px';
  cell.appendChild(tag);
  return cell;
}
function renderSurfaces(t) {
  const grid = el('div', 'row');
  for (const v of VARIANTS) {
    const pad = v.pad != null ? v.pad : PAD;
    for (const mode of v.modes) grid.appendChild(frame(t.name, v.key, v.cls, mode, v.w, v.h, !!v.custom, pad, mode, false));
    if (t.flat && /^(button|tile)\./.test(v.key)) {
      if (v.modes.includes('raised')) grid.appendChild(frame(t.name, v.key, v.cls, 'raised', v.w, v.h, false, PAD, 'active', true));
      if (v.modes.includes('inset')) grid.appendChild(frame(t.name, v.key, v.cls, 'inset', v.w, v.h, false, PAD, 'inset.active', true));
    }
  }
  return grid;
}

// A theme's full-screen ground: its background image (--face-image / --wood-panel)
// if it has one, else the flat --face. Used behind EVERY screen — grid AND clocks.
const GROUND = 'var(--face-image,var(--wood-panel,var(--face)))';
function applyGround(node) {
  node.style.background = GROUND;
  node.style.backgroundSize = 'cover';
  node.style.backgroundPosition = 'center';
}

// ---- clocks (color roles mirror app/src/screens/clock/faces.tsx) ----
function digitalClock(t) {
  const wrap = themed(t.name, 'clock');
  applyGround(wrap);
  wrap.innerHTML =
    '<div class="day" style="color:var(--accent)">MON</div>' +
    '<div class="date" style="color:var(--muted)">21 JUL 2026</div>' +
    '<div class="time" style="color:var(--accent)">10:08<span class="secs" style="color:var(--muted)"> 42</span></div>' +
    '<div class="credit" style="color:var(--muted)">by DomoDreams.it</div>' +
    '<div class="alarm">' +
      '<div class="surf raised no-led"></div>' +
      '<span class="lbl" style="color:var(--accent)">' + BELL + '</span>' +
      '<span class="lbl" style="color:var(--ink,var(--accent))">07:30</span>' +
    '</div>';
  return wrap;
}
// Analog dial (10:08:42). Ticks: cardinal=accent, major=ink, minor=muted;
// numerals=ink; hour/min hands=ink; second hand + hub=accent (per faces.tsx).
function analogClock(t) {
  const S = 360, C = S / 2, rO = C - 18;
  let ticks = '';

// ---- single-theme editor: syntax highlight + live validation against the Theme type ----
const REQUIRED_TOKENS = ['--face', '--depth', '--radius', '--raised-grad', '--inset-grad', '--raised-light', '--raised-dark', '--inset-light', '--inset-dark', '--ink', '--muted', '--accent', '--led-on-grad', '--led-off-grad'];
const RECO_TOKENS = ['--accent-ink', '--status', '--success', '--warning', '--error', '--led-glow', '--icon-glow', '--label-glow'];
const KNOWN_FIELDS = new Set(['name', 'label', 'appearance', 'flat', 'tokens', 'surfaceCss']);
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function validateTheme(o) {
  const errs = [], warns = [];
  if (typeof o !== 'object' || o === null || Array.isArray(o))
    return { errs: ['Root must be a single theme OBJECT — edit one theme at a time, not the array.'], warns };
  if (typeof o.name !== 'string' || !o.name) errs.push('name: required string');
  else if (!/^[A-Za-z0-9_-]+$/.test(o.name)) errs.push('name: must be a slug (A–Z a–z 0–9 - _)');
  if ('label' in o && typeof o.label !== 'string') errs.push('label: must be a string');
  if ('appearance' in o && o.appearance !== 'light' && o.appearance !== 'dark') errs.push('appearance: "light" | "dark"');
  if ('flat' in o && typeof o.flat !== 'boolean') errs.push('flat: must be a boolean');
  if ('surfaceCss' in o && typeof o.surfaceCss !== 'string') errs.push('surfaceCss: must be a string');
  if (typeof o.tokens !== 'object' || o.tokens === null || Array.isArray(o.tokens)) errs.push('tokens: required object of CSS custom properties');
  else {
    for (const [k, v] of Object.entries(o.tokens)) {
      if (!k.startsWith('--')) errs.push('tokens."' + k + '": key must start with --');
      if (typeof v !== 'string') errs.push('tokens."' + k + '": value must be a string');
    }
    for (const r of REQUIRED_TOKENS) if (!(r in o.tokens)) errs.push('tokens: missing required ' + r);
    for (const r of RECO_TOKENS) if (!(r in o.tokens)) warns.push('tokens: missing ' + r + ' (optional)');
  }
  for (const k of Object.keys(o)) if (!KNOWN_FIELDS.has(k)) warns.push('unknown field "' + k + '" (ignored)');
  return { errs, warns };
}

function hlJson(s) {
  return esc(s).replace(/("(?:\\.|[^"\\])*"(\s*:)?|\b(?:true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g, (m) => {
    let c = 'num';
    if (/^"/.test(m)) c = /:\s*$/.test(m) ? 'key' : 'str';
    else if (/^(true|false)$/.test(m)) c = 'bool';
    else if (/^null$/.test(m)) c = 'null';
    return '<span class="' + c + '">' + m + '</span>';
  });
}

// commit an edited theme object: validate → render live → autosave into the working set
function commit(o, syncJson) {
  const status = $('ed-status'), msgs = $('ed-msgs');
  const { errs, warns } = validateTheme(o);
  msgs.innerHTML = errs.map((e) => '<div class="e">✗ ' + esc(e) + '</div>').join('') +
    warns.map((w) => '<div class="w">! ' + esc(w) + '</div>').join('') ||
    '<div class="w" style="color:#7bd07b">✓ matches the Theme type — saved &amp; rendering live</div>';
  if (errs.length) { status.className = 'ed-status bad'; status.textContent = '✗ ' + errs.length + ' error' + (errs.length > 1 ? 's' : ''); return; }
  status.className = 'ed-status ok'; status.textContent = '✓ valid' + (warns.length ? ' · ' + warns.length + ' warning' + (warns.length > 1 ? 's' : '') : '');
  editedObj = o;
  $('ed-name').textContent = o.name;
  // re-scope theme-specific surfaceCss selectors to the theme's own name (after a
  // rename) so structural themes like Oak Wood keep matching their own rules
  if (o.surfaceCss) o.surfaceCss = o.surfaceCss.replace(/\[data-theme="[^"]*"\]/g, '[data-theme="' + o.name + '"]');
  $('edit-style').textContent = '.themed[data-theme="' + o.name + '"]{' + tokensToCss(o.tokens) + '}\n' + (o.surfaceCss || '');
  render(o);
  writeBackEdited(o);   // update-in-place: persist into the working set + drafts
  if (syncJson) $('ed-code').value = JSON.stringify(o, null, 2);
}

// where a theme came from vs the bundled seed: '' (bundled, untouched), 'modified', or 'new'
function originOf(t) {
  if (!t || !SEED_BY_NAME.has(t.name)) return t ? 'new' : '';
  return JSON.stringify(SEED_BY_NAME.get(t.name)) !== JSON.stringify(t) ? 'modified' : '';
}

// autosave the theme being edited back into the working set, tracking renames via the
// slot the editor owns. A rename onto a DIFFERENT existing theme is rejected (no clobber).
function writeBackEdited(o) {
  if (editSlotName == null) return;              // not in an editing session
  const slot = DATA.themes.findIndex((x) => x.name === editSlotName);
  if (o.name !== editSlotName) {
    const conflict = DATA.themes.findIndex((x) => x.name === o.name);
    if (conflict >= 0 && conflict !== slot) {
      $('ed-status').className = 'ed-status bad';
      $('ed-status').textContent = '✗ name "' + o.name + '" already exists';
      $('ed-msgs').insertAdjacentHTML('afterbegin', '<div class="e">✗ name "' + esc(o.name) + '" is already used — pick a unique slug (not saved)</div>');
      return;
    }
  }
  if (slot >= 0) DATA.themes[slot] = o; else DATA.themes.push(o);
  editSlotName = o.name; current = o;
  refreshSelect(o.name);
  persist();
}

// ---- form (GUI) editor: field-appropriate controls ----
function fldRow(k, inner) { return '<label class="fld"><span class="fld-k" title="' + attr(k) + '">' + esc(k) + '</span><span class="fld-c">' + inner + '</span></label>'; }
function tokenRow(k, v) {
  if (k === '--depth') return fldRow(k, '<input type="number" class="fi fnum" data-val="' + attr(k) + '" min="0" max="1" step="0.01" value="' + attr(v) + '">');
  if (k === '--radius') { const n = parseFloat(v); return fldRow(k, '<input type="number" class="fi fnum" data-val="' + attr(k) + '" data-unit="px" min="0" max="60" step="1" value="' + (isFinite(n) ? n : '') + '"><span class="funit">px</span>'); }
  if (v.includes('data:image') || v.length > 1500) return fldRow(k, '<span class="fbig">' + esc(v.slice(0, 30)) + '… (' + Math.round(v.length / 1024) + ' KB — edit in JSON)</span>');
  if (isHex6(v)) return fldRow(k, '<input type="color" class="fcol" data-pick="' + attr(k) + '" value="' + attr(v) + '"><input type="text" class="fi fhex" data-val="' + attr(k) + '" value="' + attr(v) + '">');
  if (isHex8(v)) return fldRow(k, '<input type="color" class="fcol" data-pick="' + attr(k) + '" value="' + attr(v.slice(0, 7)) + '"><input type="text" class="fi fhex" data-val="' + attr(k) + '" value="' + attr(v) + '">');
  return fldRow(k, '<textarea class="fi ftxt" data-val="' + attr(k) + '" rows="1">' + esc(v) + '</textarea>');
}
function buildForm(o) {
  let h = '<div class="fgrp"><div class="fgrp-t">Meta</div>';
  h += fldRow('name', '<input class="fi" data-fld="name" value="' + attr(o.name || '') + '">');
  h += fldRow('label', '<input class="fi" data-fld="label" value="' + attr(o.label || '') + '">');
  h += fldRow('appearance', '<select class="fi" data-fld="appearance"><option value="light"' + (o.appearance === 'light' ? ' selected' : '') + '>light</option><option value="dark"' + (o.appearance !== 'light' ? ' selected' : '') + '>dark</option></select>');
  h += fldRow('flat', '<input type="checkbox" data-fld="flat"' + (o.flat ? ' checked' : '') + '>');
  h += '</div><div class="fgrp"><div class="fgrp-t">Tokens</div>';
  for (const [k, v] of Object.entries(o.tokens || {})) h += tokenRow(k, String(v));
  // Always expose the semantic status colours (default green/amber/red — the
  // Alarmo palette) so they can be authored even before a theme overrides them.
  const STATUS_DEF = { '--success': '#3ea672', '--warning': '#e6a23c', '--error': '#e2483a' };
  for (const sk in STATUS_DEF) if (!(o.tokens && sk in o.tokens)) h += tokenRow(sk, STATUS_DEF[sk]);
  h += '</div><div class="fgrp"><div class="fgrp-t">surfaceCss (advanced)</div><textarea class="fi fcss" data-fld="surfaceCss" rows="3">' + esc(o.surfaceCss || '') + '</textarea></div>';

}

// ---- draft persistence: the working set autosaves to the browser (localStorage) ----

    catch (e) { toast('⚠ Could not save drafts (storage full?) — Export to keep your work'); }
  }, 400);
}

// ---- apply the working set + (re)build the theme selector ----
function apply(data) {
  if (!data || !Array.isArray(data.themes) || !data.themes.length) throw new Error('data.themes[] required');
  DATA = data;
  buildStyle(data);
  refreshSelect(data.themes[0].name);
  current = DATA.themes.find((x) => x.name === $('sel').value) || DATA.themes[0];
  render(current);
}
function refreshSelect(selName) {
  const sel = $('sel');
  const want = selName != null ? selName : sel.value;
  sel.innerHTML = '';
  for (const t of DATA.themes) {
    const o = el('option'); o.value = t.name;
    const org = originOf(t);
    o.textContent = (t.label || t.name) + (org === 'new' ? '  ＋' : org === 'modified' ? '  ●' : '');
    sel.appendChild(o);
  }
  sel.value = DATA.themes.some((t) => t.name === want) ? want : (DATA.themes[0] ? DATA.themes[0].name : '');
  $('count').textContent = DATA.themes.length + ' theme' + (DATA.themes.length === 1 ? '' : 's');
  const del = $('delBtn'); if (del) del.disabled = DATA.themes.length <= 1;
}

// ---- working-set operations (create / duplicate / delete / reset) ----
function uniqName(base) {
  const has = (x) => DATA.themes.some((t) => t.name === x);
  if (!has(base)) return base;
  let i = 2; while (has(base + '-' + i)) i++;
  return base + '-' + i;
}
function exitEditSession() {
  $('editor').hidden = true; $('editBtn').textContent = '✎ Edit'; $('edit-style').textContent = '';
  editedObj = null; editSnapshot = null; editSlotName = null;
}
function newTheme() {
  const t = clone(TEMPLATE); t.name = uniqName('new-theme');
  DATA.themes.push(t);
  buildStyle(DATA); current = t; refreshSelect(t.name); persist();
  openEditor();
  toast('New theme "' + t.name + '" — edit it, then Export or open a GitHub request');
}
function duplicateTheme() {
  if (!current) return;
  const src = (editedObj && editSlotName === current.name) ? editedObj : current;
  const t = clone(src);
  t.name = uniqName(current.name.replace(/-copy(-\d+)?$/, '') + '-copy');
  if (t.label) t.label = t.label.replace(/\s*\(copy\)$/, '') + ' (copy)';
  const i = DATA.themes.findIndex((x) => x.name === current.name);
  DATA.themes.splice(i >= 0 ? i + 1 : DATA.themes.length, 0, t);
  buildStyle(DATA); current = t; refreshSelect(t.name); persist();
  openEditor();
  toast('Duplicated → "' + t.name + '"');
}
function deleteTheme() {
  if (!current || DATA.themes.length <= 1) return;
  if (!confirm('Delete "' + (current.label || current.name) + '" from your local set?\nExport or submit it first if you want to keep it.')) return;
  const i = DATA.themes.findIndex((x) => x.name === current.name);
  DATA.themes.splice(i, 1);
  exitEditSession();
  const next = DATA.themes[Math.min(i, DATA.themes.length - 1)];
  buildStyle(DATA); current = next; refreshSelect(next.name); render(next); persist();
  toast('Deleted');
}
function resetAll() {
  if (!confirm('Discard ALL local changes and reload the bundled themes?\nThis cannot be undone.')) return;
  try { localStorage.removeItem(LSKEY); } catch (e) {}
  exitEditSession();
  DATA.themes = clone(SEED_THEMES);
  buildStyle(DATA); current = DATA.themes[0]; refreshSelect(current.name); render(current);
  toast('Reset to the ' + DATA.themes.length + ' bundled themes');
}

// ---- export: one theme, or the whole set as a themes/ folder inside a zip ----
function download(name, data, type) {
  const blob = new Blob([data], { type: type || 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = el('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function exportOne(t) {
  if (!t) return;
  download(t.name + '.theme.json', JSON.stringify(t, null, 2) + '\n', 'application/json');
  toast('Exported ' + t.name + '.theme.json');
}
function exportAllZip() {
  const files = [{ name: 'themes/_manifest.json',
    text: JSON.stringify({ baseCss: seed.baseCss, order: DATA.themes.map((t) => t.name) }, null, 2) + '\n' }];
  for (const t of DATA.themes) files.push({ name: 'themes/' + t.name + '.theme.json', text: JSON.stringify(t, null, 2) + '\n' });
  download('themes.zip', makeZip(files), 'application/zip');
  toast('Exported ' + DATA.themes.length + ' themes → themes.zip (unzips into themes/)');
}

// ---- import: one or more .theme.json files, a {baseCss,themes[]} bundle, or a themes.zip ----
function upsertTheme(t) {
  const i = DATA.themes.findIndex((x) => x.name === t.name);
  if (i >= 0) DATA.themes[i] = t; else DATA.themes.push(t);
}
function importJsonText(text) {
  let o; try { o = JSON.parse(text); } catch (e) { toast('Skipped a file: invalid JSON'); return 0; }
  const list = o && Array.isArray(o.themes) ? o.themes : [o];   // bundle or single theme
  let n = 0;
  for (const t of list) {
    const { errs } = validateTheme(t);
    if (errs.length) { toast('Skipped "' + ((t && t.name) || '?') + '": ' + errs[0]); continue; }
    upsertTheme(t); n++;
  }
  return n;
}
async function importFiles(fileList) {
  let added = 0;
  for (const file of Array.from(fileList || [])) {
    const lower = file.name.toLowerCase();
    if (lower.endsWith('.zip')) {
      try {
        for (const e of readZip(await file.arrayBuffer())) {
          if (e.name.endsWith('.theme.json') || (e.name.endsWith('.json') && !e.name.endsWith('_manifest.json'))) added += importJsonText(e.text);
        }
      } catch (err) { toast('Zip import failed: ' + err.message); }
    } else if (lower.endsWith('.json')) {
      added += importJsonText(await file.text());
    }
  }
  buildStyle(DATA); refreshSelect(current && current.name); persist();
  current = DATA.themes.find((x) => x.name === $('sel').value) || DATA.themes[0];
  render(current);
  toast('Imported ' + added + ' theme' + (added === 1 ? '' : 's'));
}

// ---- GitHub feature request: prefill an issue; big themes attach the downloaded file ----
function issueBody(t, includeJson) {
  const org = originOf(t);
  const lines = [
    '### Theme submission', '',
    '| Field | Value |', '|---|---|',
    '| Slug (`name`) | `' + t.name + '` |',
    '| Label | ' + (t.label || t.name) + ' |',
    '| Appearance | ' + (t.appearance || '?') + ' |',
    '| Style | ' + (t.flat ? 'reactive surface (flat)' : 'reactive glyph') + ' |',
    '| Based on | ' + (org === 'new' ? 'new, from scratch' : org === 'modified' ? 'modified `' + t.name + '`' : '`' + t.name + '`') + ' |',
    '',
    '### Golden-rule checklist',
    '- [ ] State is visible (the glyph relights, or the surface lights, on ON)',
    '- [ ] Previewed in `themes-viewer.html` (palette, panel, clocks, alarmo, music)',
    '- [ ] `name` is a unique kebab slug',
    '',
    '### Theme JSON', '',
  ];
  if (includeJson) lines.push('```json', JSON.stringify(t, null, 2), '```');
  else lines.push('> Too large to paste inline — the `' + t.name + '.theme.json` file was downloaded to your computer; **drag it into this issue** to attach it.');
  lines.push('', '_Generated by the DomoDreams Theme Studio (themes-viewer.html)._');

}
function githubRequest(t) {

  navigator.clipboard?.writeText(issueBody(t, small));

    encodeURIComponent('[Theme] ' + (t.label || t.name));

}

// ---- dependency-free ZIP (STORE method, no compression) — offline, no libraries ----
const CRC_TABLE = (() => {
  const tbl = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); tbl[n] = c >>> 0; }
  return tbl;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
const ZENC = new TextEncoder(), ZDEC = new TextDecoder();
function makeZip(files) {
  const d = new Date();
  const time = ((d.getHours() & 0x1f) << 11) | ((d.getMinutes() & 0x3f) << 5) | ((d.getSeconds() >> 1) & 0x1f);
  const date = (((d.getFullYear() - 1980) & 0x7f) << 9) | (((d.getMonth() + 1) & 0xf) << 5) | (d.getDate() & 0x1f);
  const u16 = (n) => [n & 0xff, (n >> 8) & 0xff];
  const u32 = (n) => [n & 0xff, (n >> 8) & 0xff, (n >> 16) & 0xff, (n >>> 24) & 0xff];
  const chunks = [], central = [];
  let offset = 0;
  for (const f of files) {
    const nameB = ZENC.encode(f.name), dataB = ZENC.encode(f.text), crc = crc32(dataB);
    const lfh = [].concat(u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(time), u16(date),
      u32(crc), u32(dataB.length), u32(dataB.length), u16(nameB.length), u16(0));
    const lfhB = new Uint8Array(lfh);
    chunks.push(lfhB, nameB, dataB);
    const local = offset; offset += lfhB.length + nameB.length + dataB.length;
    central.push(new Uint8Array([].concat(u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(time), u16(date),
      u32(crc), u32(dataB.length), u32(dataB.length), u16(nameB.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(local))), nameB);
  }
  const cdStart = offset; let cdSize = 0;
  for (const c of central) { chunks.push(c); cdSize += c.length; }
  chunks.push(new Uint8Array([].concat(u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length), u32(cdSize), u32(cdStart), u16(0))));
  let total = 0; for (const c of chunks) total += c.length;
  const out = new Uint8Array(total); let p = 0;
  for (const c of chunks) { out.set(c, p); p += c.length; }
  return out;
}
function readZip(buf) {   // STORE entries only (what makeZip writes); compressed entries are skipped
  const bytes = new Uint8Array(buf), dv = new DataView(buf);
  let eocd = -1;
  for (let i = bytes.length - 22; i >= 0; i--) { if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; } }
  if (eocd < 0) throw new Error('not a zip');
  const count = dv.getUint16(eocd + 10, true);
  let p = dv.getUint32(eocd + 16, true);
  const out = [];
  for (let n = 0; n < count && dv.getUint32(p, true) === 0x02014b50; n++) {
    const method = dv.getUint16(p + 10, true), compSize = dv.getUint32(p + 20, true);
    const nameLen = dv.getUint16(p + 28, true), extraLen = dv.getUint16(p + 30, true), commentLen = dv.getUint16(p + 32, true);
    const lho = dv.getUint32(p + 42, true);
    const name = ZDEC.decode(bytes.subarray(p + 46, p + 46 + nameLen));
    const dataStart = lho + 30 + dv.getUint16(lho + 26, true) + dv.getUint16(lho + 28, true);
    if (method === 0) out.push({ name, text: ZDEC.decode(bytes.subarray(dataStart, dataStart + compSize)) });
    else console.warn('readZip: skipping compressed entry', name);
    p += 46 + nameLen + extraLen + commentLen;
  }
  return out;
}

  navigator.clipboard?.writeText(JSON.stringify(editedObj || current, null, 2));
  $('ed-status').className = 'ed-status ok'; $('ed-status').textContent = '✓ JSON copied';
  toast('Theme JSON copied to clipboard');
});
$('tab-form').addEventListener('click', () => showTab('form'));
$('tab-json').addEventListener('click', () => showTab('json'));
// form edits → keep the color picker and hex text in sync, then commit
$('ed-form').addEventListener('input', (e) => {
  const t = e.target;
  if (t.matches('[data-pick]')) {
    const hex = $('ed-form').querySelector('[data-val="' + t.getAttribute('data-pick') + '"]');
    if (hex) hex.value = t.value + (hex.value.length === 9 ? hex.value.slice(7) : '');
  } else if (t.classList.contains('fhex')) {
    const pick = $('ed-form').querySelector('[data-pick="' + t.getAttribute('data-val') + '"]');
    if (pick && /^#[0-9a-fA-F]{6}/.test(t.value)) pick.value = t.value.slice(0, 7);
  }
  formChanged();
});
$('ed-code').addEventListener('input', () => { clearTimeout(edTimer); edTimer = setTimeout(updateEditor, 200); });
$('ed-code').addEventListener('scroll', syncScroll);

// ---- boot: working set = saved drafts if any, else a fresh clone of the bundled themes ----
apply({ baseCss: seed.baseCss, themes: loadSaved() || clone(seed.themes) });
</script>
</body>
</html>
