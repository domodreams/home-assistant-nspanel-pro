name: Deploy site to Pages

# Publishes the site/ folder to GitHub Pages (served at nspanel.domodreams.it).
# The site lives in site/ (not /docs), so Pages must use the "GitHub Actions"
# source — this workflow is what deploys it.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Bind the custom domain (CNAME travels with the artifact)
        run: echo 'nspanel.domodreams.it' > site/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
